<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Nearby | Driver Dispatch Registry</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Georgia:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-background text-on-background font-body-base overflow-x-hidden min-h-screen">

    <!-- Top sticky AppBar -->
    <header class="w-full top-0 sticky z-40 bg-background border-b-2 border-on-background shadow-[4px_4px_0px_0px_rgba(28,27,25,1)]">
        <div class="flex justify-between items-center px-margin-mobile md:px-margin-desktop py-stack-md max-w-[1200px] mx-auto">
            <div class="flex items-center gap-4">
                <span class="material-symbols-outlined text-primary p-2">local_shipping</span>
                <h1 class="font-display-lg text-display-lg-mobile text-primary uppercase tracking-tight">Nearby Dispatch</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-8">
                    <a class="font-caps text-xs text-primary hover:underline" href="/driver.html">My Deliveries</a>
                    <a class="font-caps text-xs text-on-surface-variant hover:text-primary transition-colors" href="/login.html" onclick="logoutUser(event)">Logout</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-margin-mobile md:px-margin-desktop py-stack-lg relative z-10">
        
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-stack-md border-b-2 border-on-background pb-6 mb-8">
            <div>
                <span class="font-caps text-[9px] text-primary block mb-1">DRIVER DISPATCH REGISTRY</span>
                <h1 class="font-display-lg text-4xl text-on-background leading-none">Delivery Log</h1>
                <p class="text-xs text-on-surface-variant mt-1 font-italic" id="driver-greeting">Loading driver profile...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchDeliveries()" class="bg-surface border-2 border-on-background hard-shadow px-4 py-2 font-caps text-xs">🔄 REFRESH</button>
            </div>
        </div>

        <!-- Stats bar -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="double-rule bg-primary text-white p-4 hard-shadow text-center">
                <span class="font-caps text-[9px] opacity-80 block mb-1">Total Assigned</span>
                <span class="font-display-lg text-2xl" id="stat-total">0</span>
            </div>
            <div class="double-rule bg-surface p-4 hard-shadow text-center">
                <span class="font-caps text-[9px] text-on-surface-variant block mb-1">Active Runs</span>
                <span class="font-display-lg text-2xl text-on-background" id="stat-active">0</span>
            </div>
            <div class="double-rule bg-[#ceeace]/30 p-4 hard-shadow text-center">
                <span class="font-caps text-[9px] text-secondary block mb-1">Delivered</span>
                <span class="font-display-lg text-2xl text-secondary" id="stat-delivered">0</span>
            </div>
        </div>

        <!-- Delivery cards grid -->
        <div id="delivery-list" class="space-y-4">
            <div class="text-center py-12 italic text-on-surface-variant">Syncing dispatch registry...</div>
        </div>

    </main>

    <!-- Floating Chatbot script -->
    <script src="/js/chatbot.js"></script>

    <script>
        // Check auth & driver role
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (!currentUser || currentUser.role !== 'driver') {
            window.location.href = '/login.html';
        }

        function logoutUser(e) {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            sessionStorage.removeItem('chatbot_history');
            window.location.href = '/login.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('driver-greeting').textContent =
                `Logged in as: ${currentUser.name} (ID #${currentUser.id})`;
            fetchDeliveries();
        });

        // Status → colour mapping
        const STATUS_COLORS = {
            'Preparing':      { bg: 'bg-[#f7f3ec]', text: 'text-[#1c1b19]',  badge: 'bg-[#e8e2d8]' },
            'Shipped':        { bg: 'bg-[#ffdbd1]/20', text: 'text-[#c1502e]', badge: 'bg-[#c1502e] text-white' },
            'On the way':     { bg: 'bg-[#ffdbd1]/30', text: 'text-[#c1502e]', badge: 'bg-primary text-white animate-pulse' },
            'Out for delivery':{ bg: 'bg-[#ceeace]/20', text: 'text-secondary', badge: 'bg-secondary text-white animate-pulse' },
            'Delivered':      { bg: 'bg-[#ceeace]/30', text: 'text-secondary', badge: 'bg-[#3e5641] text-white' },
        };

        async function fetchDeliveries() {
            const list = document.getElementById('delivery-list');
            list.innerHTML = `<div class="text-center py-12 italic text-on-surface-variant">Syncing dispatch registry...</div>`;

            try {
                const response = await fetch(`/drivers/${currentUser.id}/deliveries`);
                if (!response.ok) {
                    list.innerHTML = `<div class="text-center py-12 text-error font-semibold">❌ Unable to load delivery registry.</div>`;
                    return;
                }

                const rows = await response.json();
                if (!rows || rows.length === 0) {
                    list.innerHTML = `<div class="text-center py-12 italic text-on-surface-variant">No deliveries assigned yet. Check back soon.</div>`;
                    document.getElementById('stat-total').textContent = '0';
                    document.getElementById('stat-active').textContent = '0';
                    document.getElementById('stat-delivered').textContent = '0';
                    return;
                }

                // Group by order_id so multi-item orders appear as one card
                const grouped = {};
                rows.forEach(row => {
                    const oid = row.delivery_id || row.order_id;
                    if (!grouped[oid]) {
                        grouped[oid] = { ...row, items: [] };
                    }
                    grouped[oid].items.push({
                        product_name: row.product_name,
                        quantity: row.quantity,
                        price: row.price,
                    });
                });

                const cards = Object.values(grouped);

                // Stats
                const total = cards.length;
                const delivered = cards.filter(c => c.status === 'Delivered').length;
                const active = total - delivered;
                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-active').textContent = active;
                document.getElementById('stat-delivered').textContent = delivered;

                list.innerHTML = '';

                cards.forEach(card => {
                    const colors = STATUS_COLORS[card.status] || STATUS_COLORS['Preparing'];
                    const eta = card.estimated_delivery
                        ? new Date(card.estimated_delivery).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
                        : 'Pending';
                    const shipped = card.shipped_at
                        ? new Date(card.shipped_at).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
                        : 'Not shipped yet';

                    const itemLines = (card.items || []).map(i =>
                        `<span class="inline-flex items-center gap-1 bg-surface-container-high px-2 py-0.5 text-[10px] font-mono border border-on-background/10">
                            ${i.quantity}× ${i.product_name} <span class="text-primary font-bold">$${parseFloat(i.price).toFixed(2)}</span>
                        </span>`
                    ).join('');

                    const div = document.createElement('div');
                    div.className = `double-rule ${colors.bg} p-5 hard-shadow border-l-4 border-primary`;
                    div.innerHTML = `
                        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">

                            <!-- Left: order + customer info -->
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="font-display-lg text-lg ${colors.text}">Order #${card.order_id}</span>
                                    <span class="px-2 py-0.5 text-[9px] font-caps font-bold border border-on-background/20 ${colors.badge}">${card.status}</span>
                                </div>

                                <div class="mb-3">
                                    <p class="font-caps text-[9px] text-on-surface-variant mb-1">CUSTOMER</p>
                                    <p class="font-bold text-sm">${card.customer_name || 'Unknown'}</p>
                                </div>

                                <div class="mb-3">
                                    <p class="font-caps text-[9px] text-on-surface-variant mb-2">ITEMS IN ORDER</p>
                                    <div class="flex flex-wrap gap-2">${itemLines}</div>
                                </div>
                            </div>

                            <!-- Right: tracking info -->
                            <div class="md:min-w-[260px] bg-surface border border-on-background/10 p-4 space-y-3">
                                <div>
                                    <p class="font-caps text-[9px] text-on-surface-variant">CURRENT LOCATION</p>
                                    <p class="font-bold text-sm flex items-center gap-1">
                                        <span class="material-symbols-outlined text-[16px] text-primary">location_on</span>
                                        ${card.current_location || 'Updating...'}
                                    </p>
                                </div>
                                <div class="grid grid-cols-2 gap-3 border-t border-on-background/5 pt-3">
                                    <div>
                                        <p class="font-caps text-[9px] text-on-surface-variant">SHIPPED</p>
                                        <p class="text-xs font-semibold">${shipped}</p>
                                    </div>
                                    <div>
                                        <p class="font-caps text-[9px] text-on-surface-variant">ETA</p>
                                        <p class="text-xs font-semibold text-primary">${eta}</p>
                                    </div>
                                </div>
                                <div class="bg-[#f7f3ec] border-l-2 border-primary p-2 border border-on-background/5">
                                    <p class="font-caps text-[9px] text-on-surface-variant mb-0.5">TRACKING NOTE</p>
                                    <p class="text-xs italic">"${card.tracking_note || 'No notes recorded.'}"</p>
                                </div>
                                ${card.status !== 'Delivered' ? `
                                <button onclick="markDelivered(${card.delivery_id}, this)"
                                    class="w-full bg-secondary text-white border border-[#1c1b19] py-1.5 font-caps text-[10px] font-bold hover:opacity-90">
                                    ✓ MARK AS DELIVERED
                                </button>` : `
                                <div class="text-center text-[#3e5641] font-caps text-[10px] font-bold py-1.5 bg-[#ceeace]/50 border border-[#3e5641]">
                                    ✅ DELIVERY COMPLETE
                                </div>`}
                            </div>
                        </div>
                    `;
                    list.appendChild(div);
                });

            } catch (err) {
                list.innerHTML = `<div class="text-center py-12 text-error font-semibold">❌ Connection error: ${err.message}</div>`;
            }
        }

        async function markDelivered(deliveryId, btn) {
            if (!deliveryId) {
                alert("Cannot update — delivery ID unavailable.");
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const response = await fetch(`/deliveries/${deliveryId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.token}`
                    },
                    body: JSON.stringify({ status: 'Delivered' })
                });

                if (response.ok) {
                    // Refresh the whole list to show updated state
                    await fetchDeliveries();
                } else {
                    let errMsg = 'Server error';
                    try { const errData = await response.json(); errMsg = errData.detail || errMsg; } catch(_) {}
                    alert(`❌ Update failed: ${errMsg}`);
                    btn.disabled = false;
                    btn.textContent = '✓ MARK AS DELIVERED';
                }
            } catch (err) {
                alert("❌ Connection error while updating delivery status.");
                btn.disabled = false;
                btn.textContent = '✓ MARK AS DELIVERED';
            }
        }
    </script>
</body>
</html>
